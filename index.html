<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 검색</title>

<style>
/* ▒▒▒ 대리석 다크 테마 배경 ▒▒▒ */
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px 20px 0 20px; /* bottom padding 제거 */
    margin:0;

    background: #0d0d0d;
    background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.04) 0%, transparent 40%),
        repeating-linear-gradient(
            45deg,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 2px,
            rgba(0,0,0,0.1) 2px,
            rgba(0,0,0,0.1) 6px
        );
    background-size: cover;
    color: #e8e8e8;

    display:block;
    min-height:auto;
}

/* 제목 */
h2{
  font-size:22px;
  margin-bottom:18px;
  color:#fff;
}

/* 검색창 */
input{
  width:90%;
  max-width:420px;
  padding:14px;
  font-size:18px;
  border:1px solid #555;
  border-radius:8px;
  margin-bottom:18px;
  outline:none;
  background:#1a1a1a;
  color:#eee;
}

/* 검색 전체 결과 박스 */
#results{
  max-width: 500px;
  width: 100%;
  height: 400px;
  overflow-y: auto;

  border:1px solid #444;
  padding:10px 10px 0 10px; /* 하단 패딩 제거 */

  background:rgba(255,255,255,0.05);
  border-radius:12px;

  margin: 0 auto 0 auto; /* 상하 margin 제거 */
}

/* 목록 개별 아이템 */
.result-item{
  margin-bottom:20px;
}

/* 마지막 아이템 하단 공백 제거 */
.result-item:last-child{
  margin-bottom:0 !important;
}

/* 검색된 큰 이미지 */
.result-img{
  width:100%;
  max-width:250px;
  border-radius:10px;
  display:block;
  margin:auto;
  border:1px solid #333;
}

/* 전체 목록 썸네일 */
.thumb-img{
  width:100%;
  max-width:200px;
  border-radius:10px;
  display:block;
  margin:15px auto 5px auto;
  border:1px solid #333;
}

/* 파일명 캡션 */
.caption{
  margin-top:4px;
  font-size:15px;
  font-weight:600;
  color:#ddd;
}

/* 스크롤바 */
#results::-webkit-scrollbar {
  width:8px;
}
#results::-webkit-scrollbar-thumb {
  background:#666;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>번호 / 이름 / 태그 검색</h2>

<input id="search" placeholder="예: 930 / 미스터츄 / 이서냥">

<div id="results"></div>

<script>
/* 여기다가 너의 전체 data 배열 넣으면 됨 */
const data = [
 {file:"930 미스터츄.png", tag:""},
 {file:"931 팬서비스.png", tag:""},
 {file:"933 무아.png", tag:""},
 {file:"941 사랑스러워.png", tag:""},
 {file:"952 모찌.png", tag:""}
 // … 나머지는 전부 그대로 추가하면 됨
];

const input = document.getElementById("search");
const results = document.getElementById("results");

function showAll(){
  results.innerHTML = "";
  data.forEach(item =>{
    const wrap = document.createElement("div");
    wrap.className = "result-item";

    const img = document.createElement("img");
    img.src = "images/" + item.file;
    img.className = "thumb-img";

    const caption = document.createElement("div");
    caption.className = "caption";
    caption.innerText = item.file.replace(".png","");

    wrap.appendChild(img);
    wrap.appendChild(caption);
    results.appendChild(wrap);
  });
}

showAll();

/* 검색 기능 */
input.addEventListener("input", ()=>{
  const value = input.value.trim().toLowerCase();
  if(value === ""){
    showAll();
    return;
  }

  results.innerHTML = "";

  const matched = data.filter(item =>
    item.file.toLowerCase().includes(value) ||
    item.tag.toLowerCase().includes(value)
  );

  matched.slice(0,5).forEach(item =>{
    const wrap = document.createElement("div");
    wrap.className = "result-item";

    const img = document.createElement("img");
    img.src = "images/" + item.file;
    img.className = "result-img";

    const caption = document.createElement("div");
    caption.className = "caption";
    caption.innerText = item.file.replace(".png","");

    wrap.appendChild(img);
    wrap.appendChild(caption);
    results.appendChild(wrap);
  });

  results.scrollTop = 0;
});
</script>

</body>
</html>
